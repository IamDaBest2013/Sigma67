<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sigma67 Hub Network</title>
    <style>
        :root {
            --bg-color: #121212;
            --card-color: #1e1e1e;
            --accent-color: #5c85ff;
            --text-color: #ffffff;
            --muted-text: #aaaaaa;
        }
        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }
        .container {
            background: var(--card-color);
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.6);
            text-align: center;
            max-width: 420px;
            width: 100%;
        }
        h1 { margin-bottom: 5px; font-size: 2.2rem; letter-spacing: 1px; color: #fff; }
        p { color: var(--muted-text); margin-top: 0; margin-bottom: 30px; font-size: 1rem; }
        .status-box {
            margin: 20px 0;
            font-size: 1.1rem;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .online-dot {
            height: 12px;
            width: 12px;
            background-color: #4caf50;
            border-radius: 50%;
            display: inline-block;
            margin-right: 10px;
        }
        .ip-container {
            background: #292929;
            padding: 15px;
            border-radius: 8px;
            cursor: pointer;
            transition: background 0.2s, transform 0.1s;
            border: 1px solid #3a3a3a;
            font-weight: bold;
            font-family: 'Courier New', Courier, monospace;
            font-size: 1.2rem;
            margin-top: 25px;
        }
        .ip-container:hover {
            background: #333333;
            transform: scale(1.02);
        }
        .tooltip {
            font-size: 0.8rem;
            color: var(--accent-color);
            margin-top: 8px;
            display: block;
            font-family: 'Segoe UI', sans-serif;
            font-weight: normal;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>Sigma67</h1>
    <p>Official Minecraft Java Hub Network</p>
    
    <!-- Live Server Status -->
    <div class="status-box">
        <span class="online-dot" id="status-dot"></span>
        <span id="player-count">Checking server status...</span>
    </div>

    <!-- Click to Copy Box -->
    <div class="ip-container" onclick="copyIP()">
        <span id="server-ip">hub.net</span>
        <span class="tooltip" id="copy-hint">Click to copy IP Address</span>
    </div>
</div>

<script>
    // 1. CHANGE THIS VALUE: Put your actual Minecraft Server IP or Minehut name here
    const serverIP = 'hub.net'; 
    document.getElementById('server-ip').innerText = serverIP;

    // 2. Automatically check server status from the live API
    async function fetchServerStatus() {
        try {
            const response = await fetch(`https://minetools.eu{serverIP}`);
            const data = await response.json();
            
            if (data.error) {
                document.getElementById('player-count').innerText = "Server Offline";
                document.getElementById('status-dot').style.backgroundColor = '#f44336';
            } else {
                document.getElementById('player-count').innerText = `${data.players.online} / ${data.players.max} Players Online`;
                document.getElementById('status-dot').style.backgroundColor = '#4caf50';
            }
        } catch (error) {
            document.getElementById('player-count').innerText = "Status unavailable";
            document.getElementById('status-dot').style.backgroundColor = '#ff9800';
        }
    }

    // 3. Copy to Clipboard Functionality
    function copyIP() {
        navigator.clipboard.writeText(serverIP);
        const hint = document.getElementById('copy-hint');
        hint.innerText = "IP Copied! Ready to join.";
        hint.style.color = "#4caf50";
        setTimeout(() => {
            hint.innerText = "Click to copy IP Address";
            hint.style.color = "var(--accent-color)";
        }, 2000);
    }

    // Run status query on load
    fetchServerStatus();
</script>

</body>
</html>
